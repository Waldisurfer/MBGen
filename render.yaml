services:
  - type: web
    name: mbgen-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://mbgen.netlify.app
      # Set the actual value in Render dashboard → Environment (never commit the real secret).
      # Generate with: node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
      # Required so video SSE tokens survive backend restarts and sleep/wake cycles.
      - key: SSE_TOKEN_SECRET
        sync: false
